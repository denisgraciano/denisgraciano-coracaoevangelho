<div class="p-4 text-center">
    <img [src]="info.foto" alt="Foto" width="200" class="rounded-full mb-4" />
    <h2 class="text-2xl font-bold">{{ info.nome }}</h2>
    <p class="mt-2 text-gray-700">{{ info.descricao }}</p>
    <p class="mt-2"><strong>Email:</strong> {{ info.email }}</p>
    <p><strong>Cidade:</strong> {{ info.cidade }}</p>
</div>
